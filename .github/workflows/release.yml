name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build universal app and DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/build-macos-app.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ocak-${{ steps.version.outputs.version }}-dmg
          path: .dist/Ocak.dmg

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^$TAG$" | head -1 || true)
          NOTES_ARGS=(--generate-notes)
          if [ -n "$PREV_TAG" ]; then
            NOTES_ARGS+=(--notes-start-tag "$PREV_TAG")
          fi
          gh release create "$TAG" \
            --draft \
            --title "Ocak $VERSION" \
            "${NOTES_ARGS[@]}" \
            ".dist/Ocak.dmg#Ocak.dmg"
