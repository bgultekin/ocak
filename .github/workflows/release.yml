name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          curl -sO https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          security import AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH"
          rm -f AppleWWDRCAG3.cer

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          BUILD_NUMBER=$(git tag --sort=version:refname | grep -c "^v")
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build universal app and DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_BUILD: ${{ steps.version.outputs.build_number }}
          SPARKLE_PUBLIC_KEY: ${{ vars.SPARKLE_PUBLIC_KEY }}
          SPARKLE_FEED_URL: ${{ vars.SPARKLE_FEED_URL }}
          CODESIGN_IDENTITY: "Apple Development"
        run: ./scripts/build-macos-app.sh

      - name: Sign DMG and generate appcast.xml
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: ./scripts/generate-appcast.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ocak-${{ steps.version.outputs.version }}-dmg
          path: .dist/Ocak.dmg

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^$TAG$" | head -1 || true)
          NOTES_ARGS=(--generate-notes)
          if [ -n "$PREV_TAG" ]; then
            NOTES_ARGS+=(--notes-start-tag "$PREV_TAG")
          fi
          ASSETS=(".dist/Ocak.dmg#Ocak.dmg")
          if [ -f ".dist/appcast.xml" ]; then
            ASSETS+=(".dist/appcast.xml#appcast.xml")
          fi
          gh release create "$TAG" \
            --draft \
            --title "Ocak $VERSION" \
            "${NOTES_ARGS[@]}" \
            "${ASSETS[@]}"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
