included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - Sources/Ocak/Resources

disabled_rules:
  - trailing_comma
  - todo
  - multiple_closures_with_trailing_closure
  - opening_brace
  - trailing_whitespace
  - trailing_newline
  - vertical_whitespace
  - statement_position
  - for_where
  - inclusive_language
  - legacy_nsgeometry_functions
  - unused_closure_parameter
  - implicit_optional_initialization
  - function_parameter_count
  - function_body_length
  - cyclomatic_complexity
  - file_length
  - type_body_length
  - closure_parameter_position

analyzer_rules:
  - unused_declaration

line_length:
  warning: 160
  error: 240
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  validates_start_with_lowercase: false
  excluded:
    - id
    - needs_input

type_name:
  min_length: 3
  max_length:
    warning: 60
    error: 80

nesting:
  type_level: 3

force_cast: warning
force_try: warning

reporter: "xcode"
